# Starship - lighter slate bg, arrow separators
# Place at: ~/.config/starship.toml

format = """
[  ](bg:#6b7280)\
[$directory](bg:#6b7280 fg:#f1f3f5)\
[$git_branch](bg:#6b7280 fg:#f1f3f5)\
[$git_status](bg:#6b7280 fg:#f1f3f5)\
[$rust](bg:#6b7280 fg:#f1f3f5)\
[$golang](bg:#6b7280 fg:#f1f3f5)\
[$python](bg:#6b7280 fg:#f1f3f5)\
[$nodejs](bg:#6b7280 fg:#f1f3f5)\
[$kubernetes](bg:#6b7280 fg:#f1f3f5)\
[$aws](bg:#6b7280 fg:#f1f3f5)\
[$gcloud](bg:#6b7280 fg:#f1f3f5)\
[$azure](bg:#6b7280 fg:#f1f3f5)\
[$docker_context](bg:#6b7280 fg:#f1f3f5)\
[$cmd_duration](bg:#6b7280 fg:#f1f3f5)\
[$time](bg:#6b7280 fg:#f1f3f5)\
[$memory_usage](bg:#6b7280 fg:#f1f3f5)\
[$battery](bg:#6b7280 fg:#f1f3f5)\
[$package](bg:#6b7280 fg:#f1f3f5)\
[  ](bg:#6b7280)\
$line_break\
$status\
$character"""

[character]
success_symbol = '[>](white)'
error_symbol = '[>](red)'
vimcmd_symbol = '[<](white)'

[directory]
style = 'bg:#6b7280 fg:#f1f3f5'
format = '[$path]($style)[ >](bg:#6b7280 fg:#4b5563)'
truncation_length = 4
truncate_to_repo = true
read_only = ' ro'
read_only_style = 'bg:#6b7280 fg:#f1f3f5'

[git_branch]
style = 'bg:#6b7280 fg:#f1f3f5'
symbol = ''
format = '[ $branch]($style)'

[git_status]
style = 'bg:#6b7280 fg:#f1f3f5'
format = '([$all_status$ahead_behind]($style))[ >](bg:#6b7280 fg:#4b5563)'
ahead = ' ^${count}'
behind = ' v${count}'
diverged = ' ^${ahead_count}v${behind_count}'
modified = '*'
staged = '+'
untracked = '?'
deleted = 'x'
renamed = 'r'
stashed = '$'
conflicted = '!'

[git_state]
style = 'bg:#6b7280 fg:#f1f3f5'
format = '([ $state($progress_current/$progress_total)]($style))'

[rust]
style = 'bg:#6b7280 fg:#f1f3f5'
symbol = 'rs '
format = '[ $symbol$version]($style)[ >](bg:#6b7280 fg:#4b5563)'

[golang]
style = 'bg:#6b7280 fg:#f1f3f5'
symbol = 'go '
format = '[ $symbol$version]($style)[ >](bg:#6b7280 fg:#4b5563)'

[python]
style = 'bg:#6b7280 fg:#f1f3f5'
symbol = 'py '
format = '[ $symbol$version( ($virtualenv))]($style)[ >](bg:#6b7280 fg:#4b5563)'
detect_files = ['requirements.txt', 'pyproject.toml', '.python-version', 'Pipfile']

[nodejs]
style = 'bg:#6b7280 fg:#f1f3f5'
symbol = 'node '
format = '[ $symbol$version]($style)[ >](bg:#6b7280 fg:#4b5563)'

[kubernetes]
style = 'bg:#6b7280 fg:#f1f3f5'
symbol = 'k8s '
format = '[ $symbol$context( \[$namespace\])]($style)[ >](bg:#6b7280 fg:#4b5563)'
disabled = false

[aws]
style = 'bg:#6b7280 fg:#f1f3f5'
symbol = 'aws '
format = '[ $symbol$profile( \[$region\])]($style)[ >](bg:#6b7280 fg:#4b5563)'

[gcloud]
style = 'bg:#6b7280 fg:#f1f3f5'
symbol = 'gcp '
format = '[ $symbol$account( \[$project\])]($style)[ >](bg:#6b7280 fg:#4b5563)'

[azure]
style = 'bg:#6b7280 fg:#f1f3f5'
symbol = 'az '
format = '[ $symbol$subscription]($style)[ >](bg:#6b7280 fg:#4b5563)'
disabled = false

[docker_context]
style = 'bg:#6b7280 fg:#f1f3f5'
symbol = 'docker '
format = '[ $symbol$context]($style)[ >](bg:#6b7280 fg:#4b5563)'
only_with_files = true

[cmd_duration]
style = 'bg:#6b7280 fg:#f1f3f5'
min_time = 2_000
format = '[ ${duration}]($style)[ >](bg:#6b7280 fg:#4b5563)'

[time]
disabled = false
style = 'bg:#6b7280 fg:#f1f3f5'
format = '[ $time]($style)[ >](bg:#6b7280 fg:#4b5563)'
time_format = '%H:%M'

[memory_usage]
disabled = false
style = 'bg:#6b7280 fg:#f1f3f5'
format = '[ mem $ram]($style)[ >](bg:#6b7280 fg:#4b5563)'
threshold = 0

[battery]
disabled = false
format = '[ $percentage]($style)[ >](bg:#6b7280 fg:#4b5563)'

[[battery.display]]
threshold = 20
style = 'bg:#6b7280 fg:red'

[[battery.display]]
threshold = 100
style = 'bg:#6b7280 fg:#f1f3f5'

[package]
disabled = false
style = 'bg:#6b7280 fg:#f1f3f5'
format = '[ $version]($style)[ >](bg:#6b7280 fg:#4b5563)'

[status]
style = 'red'
format = '[$status]($style) '
disabled = false

[username]
style_user = 'bg:#6b7280 fg:#f1f3f5'
style_root = 'bg:#6b7280 fg:red'
format = '[$user]($style)[ >](bg:#6b7280 fg:#4b5563)'
show_always = false

[hostname]
style = 'bg:#6b7280 fg:#f1f3f5'
format = '[@$hostname]($style)[ >](bg:#6b7280 fg:#4b5563)'
ssh_only = true

[nix_shell]
disabled = false
style = 'bg:#6b7280 fg:#f1f3f5'
symbol = 'nix '
format = '[ $symbol$state]($style)[ >](bg:#6b7280 fg:#4b5563)'
